spring.application.name=Stuffing

# === Server ===
server.port=${SERVER_PORT:8086}

# === Datasource (PostgreSQL) ===
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/Stuffing}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# === Keycloak OAuth2 Resource Server ===
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/stuffing}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/stuffing/protocol/openid-connect/certs}

# === Cache JWKS Keycloak ===
spring.security.oauth2.resourceserver.jwt.jwk-set-cache-lifespan=300000
spring.security.oauth2.resourceserver.jwt.jwk-set-cache-refresh-time=240000

# === Password reset (minutes) ===
password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:30}

# === Mail ===
app.mail.enabled=${APP_MAIL_ENABLED:true}
app.mail.from=${APP_MAIL_FROM:no-reply@sopraHr.com}

# SMTP
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# === HikariCP (DB pool) ===
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=5000

# === Lazy init OFF ===
spring.main.lazy-initialization=false

# === Keycloak Admin Client (pour créer/gérer les users Keycloak depuis le backend) ===
keycloak.server-url=${KEYCLOAK_SERVER_URL:http://localhost:8180}
keycloak.realm=${KEYCLOAK_REALM:stuffing}
keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}

# === Frontend URL (for email login link) ===
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200/login}

# === Actuator (healthcheck Docker) ===
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true


