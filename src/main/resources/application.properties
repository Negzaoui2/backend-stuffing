spring.application.name=Stuffing
spring.datasource.url=jdbc:postgresql://localhost:5432/Stuffing
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false


# === Keycloak OAuth2 Resource Server ===
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/stuffing
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/stuffing/protocol/openid-connect/certs

# Password reset (minutes)
password-reset.expiration-minutes=30

server.port=8086

# === Mail ===
app.mail.enabled=true
app.mail.from=no-reply@sopraHr.com

# SMTP Gmail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=mohamednegzaoui8@gmail.com
spring.mail.password=tbrm qzxz gdmd uggp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# === Cache JWKS Keycloak ===
spring.security.oauth2.resourceserver.jwt.jwk-set-cache-lifespan=300000
spring.security.oauth2.resourceserver.jwt.jwk-set-cache-refresh-time=240000

# === HikariCP (DB pool) ===
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=5000

# === Lazy init OFF ===
spring.main.lazy-initialization=false

# === Keycloak Admin Client (for creating users via API) ===
keycloak.server-url=http://localhost:8180
keycloak.realm=stuffing
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.admin.client-id=admin-cli

# Frontend URL (for email login link)
app.frontend-url=http://localhost:4200/login

