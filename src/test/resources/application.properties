spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Desactiver la validation Keycloak pour les tests (pas de serveur Keycloak en CI)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:18080/realms/test
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:18080/realms/test/protocol/openid-connect/certs

password-reset.expiration-minutes=30

